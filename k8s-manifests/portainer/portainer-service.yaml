---
apiVersion: v1
kind: Service
metadata:
  name: portainer
  namespace: portainer
  labels:
    app: portainer
spec:
  type: NodePort
  selector:
    app: portainer
  ports:
    - name: https-ui
      port: 9443
      targetPort: 9443
      nodePort: 30443
      protocol: TCP
    - name: http-ui
      port: 9000
      targetPort: 9000
      nodePort: 30090
      protocol: TCP
    - name: edge-agent
      port: 8000
      targetPort: 8000
      nodePort: 30800
      protocol: TCP
