services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    privileged: true
    security_opt:
      - label=disable
    ports:
      - "9000:9000"   # HTTP - for LAN/VPN access
      - "9443:9443"   # HTTPS - optional, uses self-signed cert
    volumes:
      - /run/user/1000/podman/podman.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
